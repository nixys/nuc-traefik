{{- range $index, $item := .Values.middlewares }}
{{- if (or (not (hasKey $item "enabled")) $item.enabled) }}
---
{{ include "nuc-traefik.renderResource" (dict
  "root" $
  "item" $item
  "kind" "Middleware"
  "defaultApiVersion" $.Values.apiVersions.middleware
  "resourceKey" (printf "middlewares[%d]" $index)
  "namespaced" true
) }}
{{- end }}
{{- end }}
