{{- range $key, $item := .Values.tlsOptions }}
{{- if kindIs "map" $item }}
{{- if (or (not (hasKey $item "enabled")) $item.enabled) }}
---
{{ include "nuc-traefik.renderResource" (dict
  "root" $
  "item" $item
  "kind" "TLSOption"
  "defaultApiVersion" $.Values.apiVersions.tlsOption
  "resourceKey" (printf "tlsOptions.%v" $key)
  "namespaced" true
) }}
{{- end }}
{{- end }}
{{- end }}
