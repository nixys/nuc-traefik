{{- range $key, $item := .Values.serversTransportTCPs }}
{{- if (or (not (hasKey $item "enabled")) $item.enabled) }}
---
{{ include "nuc-traefik.renderResource" (dict
  "root" $
  "item" $item
  "kind" "ServersTransportTCP"
  "defaultApiVersion" $.Values.apiVersions.serversTransportTCP
  "resourceKey" (printf "serversTransportTCPs.%v" $key)
  "namespaced" true
) }}
{{- end }}
{{- end }}
