{{- range $index, $item := .Values.ingressRoutes }}
{{- if (or (not (hasKey $item "enabled")) $item.enabled) }}
---
{{ include "nuc-traefik.renderResource" (dict
  "root" $
  "item" $item
  "kind" "IngressRoute"
  "defaultApiVersion" $.Values.apiVersions.ingressRoute
  "resourceKey" (printf "ingressRoutes[%d]" $index)
  "namespaced" true
) }}
{{- end }}
{{- end }}
