{{- range $key, $item := .Values.ingressRouteUDPs }}
{{- if kindIs "map" $item }}
{{- if (or (not (hasKey $item "enabled")) $item.enabled) }}
---
{{ include "nuc-traefik.renderResource" (dict
  "root" $
  "item" $item
  "kind" "IngressRouteUDP"
  "defaultApiVersion" $.Values.apiVersions.ingressRouteUDP
  "resourceKey" (printf "ingressRouteUDPs.%v" $key)
  "namespaced" true
) }}
{{- end }}
{{- end }}
{{- end }}
